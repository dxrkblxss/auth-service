services:
  db:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: authdb
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d authdb" ]
      interval: 5s
      timeout: 3s
      retries: 12

  redis:
    image: redis:7-alpine
    container_name: redis
    command: [ "redis-server", "--appendonly", "yes" ]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    container_name: authservice
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=authdb;Username=postgres;Password=postgres
      - DEFAULT_CONNECTION=Host=db;Port=5432;Database=authdb;Username=postgres;Password=postgres
      - REDIS__CONNECTION=redis:6379
      - JWT_KEY=CHANGE_ME_TO_A_STRONG_SECRET_FOR_LOCAL_DEV
    depends_on:
      - db
    ports:
      - "5000:80"

volumes:
  db-data:
  redis-data:
